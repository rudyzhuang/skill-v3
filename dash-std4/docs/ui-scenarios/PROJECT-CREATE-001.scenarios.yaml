feature_id: PROJECT-CREATE-001
client_target: admin
scenarios:
  - id: PROJECT-CREATE-001-SMOKE-001
    title: 管理端新建项目页可访问（已登录 admin）
    platform: web
    steps:
      - action: navigate
        url: "{base_url}/login"
      - action: type
        selector_hint: 邮箱或用户名输入框
        value: "{test_user}"
      - action: type
        selector_hint: 密码输入框
        value: "{test_password}"
      - action: click
        selector_hint: 登录按钮
      - action: wait
        timeout_ms: 2000
      - action: navigate
        url: "{base_url}/projects/new"
      - action: snapshot
    expect:
      - type: url_contains
        value: "/projects/new"
      - type: element_present
        selector_hint: 项目名称（中文）输入框
      - type: element_present
        selector_hint: 项目名称（英文）输入框

  - id: PROJECT-CREATE-001-HAPPY-001
    title: admin 填写表单创建项目成功并可在列表看到一致字段
    platform: web
    steps:
      - action: navigate
        url: "{base_url}/login"
      - action: type
        selector_hint: 邮箱或用户名输入框
        value: "{test_user}"
      - action: type
        selector_hint: 密码输入框
        value: "{test_password}"
      - action: click
        selector_hint: 登录按钮
      - action: wait
        timeout_ms: 2000
      - action: navigate
        url: "{base_url}/projects/new"
      - action: type
        selector_hint: 项目名称（中文）输入框
        value: "E2E创建项目中文"
      - action: type
        selector_hint: 项目名称（英文）输入框
        value: "E2E Create Project EN"
      - action: type
        selector_hint: 项目简介输入框
        value: "E2E 自动化创建项目简介"
      - action: click
        selector_hint: 客户端目标多选中的 admin 选项
      - action: click
        selector_hint: 客户端目标多选中的 backend 选项
      - action: click
        selector_hint: 标识新增的勾选框或开关
      - action: click
        selector_hint: 提交或创建项目按钮
      - action: wait
        timeout_ms: 3000
    expect:
      - type: url_contains
        value: "/projects"
      - type: text_present
        value: "E2E创建项目中文"
      - type: text_present
        value: "E2E Create Project EN"
      - type: element_present
        selector_hint: 列表行中的项目状态徽章（登记态 active）
      - type: element_present
        selector_hint: 列表行中的客户端目标或新增标识展示

  - id: PROJECT-CREATE-001-FORM-001
    title: 新建项目表单展示必填字段与客户端目标选项
    platform: web
    steps:
      - action: navigate
        url: "{base_url}/login"
      - action: type
        selector_hint: 邮箱或用户名输入框
        value: "{test_user}"
      - action: type
        selector_hint: 密码输入框
        value: "{test_password}"
      - action: click
        selector_hint: 登录按钮
      - action: wait
        timeout_ms: 2000
      - action: navigate
        url: "{base_url}/projects/new"
      - action: snapshot
    expect:
      - type: text_present
        value: "项目名称（中文）"
      - type: text_present
        value: "项目名称（英文）"
      - type: text_present
        value: "项目简介"
      - type: element_present
        selector_hint: 客户端目标多选（含 admin 与 backend 选项）
      - type: element_present
        selector_hint: 标识新增 is_new 的勾选或只读标签

  - id: PROJECT-CREATE-001-VALID-001
    title: 未填必填项提交时展示前端校验错误
    platform: web
    steps:
      - action: navigate
        url: "{base_url}/login"
      - action: type
        selector_hint: 邮箱或用户名输入框
        value: "{test_user}"
      - action: type
        selector_hint: 密码输入框
        value: "{test_password}"
      - action: click
        selector_hint: 登录按钮
      - action: wait
        timeout_ms: 2000
      - action: navigate
        url: "{base_url}/projects/new"
      - action: click
        selector_hint: 提交或创建项目按钮
    expect:
      - type: url_contains
        value: "/projects/new"
      - type: text_present
        value: "必填"

  - id: PROJECT-CREATE-001-ERROR-001
    title: 未选客户端目标提交时展示字段级或全局错误（等同 API 400）
    platform: web
    steps:
      - action: navigate
        url: "{base_url}/login"
      - action: type
        selector_hint: 邮箱或用户名输入框
        value: "{test_user}"
      - action: type
        selector_hint: 密码输入框
        value: "{test_password}"
      - action: click
        selector_hint: 登录按钮
      - action: wait
        timeout_ms: 2000
      - action: navigate
        url: "{base_url}/projects/new"
      - action: type
        selector_hint: 项目名称（中文）输入框
        value: "E2E缺端目标中文"
      - action: type
        selector_hint: 项目名称（英文）输入框
        value: "E2E No Client Targets"
      - action: type
        selector_hint: 项目简介输入框
        value: "未选择 client_targets 的校验场景"
      - action: click
        selector_hint: 提交或创建项目按钮
      - action: wait
        timeout_ms: 2000
    expect:
      - type: url_contains
        value: "/projects/new"
      - type: text_present
        value: "客户端"
      - type: element_absent
        selector_hint: 项目列表表格中名为 E2E缺端目标中文 的新建行

  - id: PROJECT-CREATE-001-UNAUTH-001
    title: 未登录访问新建页被重定向至登录（等同 POST /api/projects 401）
    platform: web
    steps:
      - action: navigate
        url: "{base_url}/projects/new"
      - action: wait
        timeout_ms: 2000
    expect:
      - type: url_contains
        value: "/login"
      - type: element_present
        selector_hint: 登录按钮

  - id: PROJECT-CREATE-001-RBAC-001
    title: admin 或 super_admin 在项目列表可见新建项目入口
    platform: web
    steps:
      - action: navigate
        url: "{base_url}/login"
      - action: type
        selector_hint: 邮箱或用户名输入框
        value: "{test_user}"
      - action: type
        selector_hint: 密码输入框
        value: "{test_password}"
      - action: click
        selector_hint: 登录按钮
      - action: wait
        timeout_ms: 2000
      - action: navigate
        url: "{base_url}/projects"
    expect:
      - type: element_present
        selector_hint: 新建项目按钮或链接

  - id: PROJECT-CREATE-001-RBAC-002
    title: operator 列表无新建入口且访问 /projects/new 被拒绝（等同 API 403）
    platform: web
    steps:
      - action: navigate
        url: "{base_url}/login"
      - action: type
        selector_hint: 邮箱或用户名输入框
        value: "{test_user}"
      - action: type
        selector_hint: 密码输入框
        value: "{test_password}"
      - action: click
        selector_hint: 登录按钮
      - action: wait
        timeout_ms: 2000
      - action: navigate
        url: "{base_url}/projects"
      - action: snapshot
      - action: navigate
        url: "{base_url}/projects/new"
      - action: snapshot
    expect:
      - type: element_absent
        selector_hint: 项目列表页的新建项目按钮或链接
      - type: element_absent
        selector_hint: 可点击的提交或创建项目按钮
      - type: text_present
        value: "无权限"

  - id: PROJECT-CREATE-001-SEC-001
    title: 新建页与表单不得暴露 API Key 或 Open API 路径及默认管理员明文密码
    platform: web
    steps:
      - action: navigate
        url: "{base_url}/login"
      - action: type
        selector_hint: 邮箱或用户名输入框
        value: "{test_user}"
      - action: type
        selector_hint: 密码输入框
        value: "{test_password}"
      - action: click
        selector_hint: 登录按钮
      - action: wait
        timeout_ms: 2000
      - action: navigate
        url: "{base_url}/projects/new"
      - action: snapshot
    expect:
      - type: text_absent
        value: "API Key"
      - type: text_absent
        value: "api_key"
      - type: text_absent
        value: "/api/v1/projects"
      - type: text_absent
        value: "ADMIN_PASSWORD"
